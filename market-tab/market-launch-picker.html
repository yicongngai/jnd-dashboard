<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JND — New Launch Picker (tick the SG condos)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f1f4f8;color:#1a2332;padding:18px;}
  .wrap{max-width:880px;margin:0 auto;}
  h2{font-size:18px;color:#0f2746;}h2 span{color:#c8102e;}
  .sub{font-size:11px;color:#6b7280;margin:4px 0 12px;}
  .bar{position:sticky;top:0;background:#f1f4f8;padding:8px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap;z-index:5;border-bottom:1px solid #d8dde7;}
  .bar input[type=text]{flex:1;min-width:160px;padding:7px 9px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;}
  .bar button{background:#0f2746;color:#fff;border:0;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;}
  .bar .ghost{background:#fff;border:1px solid #cbd5e1;color:#0f2746;}
  .tally{font-size:12px;color:#0f2746;font-weight:700;}
  .grp{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin:14px 0 4px;}
  .row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid #eef1f6;font-size:13px;background:#fff;}
  .row.off{opacity:.45;}
  .row input[type=checkbox]{width:17px;height:17px;flex:none;cursor:pointer;}
  .row .nm{flex:1;font-weight:600;color:#0f2746;}
  .row .nm small{font-weight:400;color:#9aa3b2;}
  .chip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;color:#fff;white-space:nowrap;}
  .chip.IM{background:#0f7a3d;}.chip.PL{background:#ed6c02;}
  .hint{font-size:10px;padding:1px 5px;border-radius:3px;background:#eef1f6;color:#5a6577;white-space:nowrap;}
  .hint.warn{background:#fde2e1;color:#c8102e;}
  .av{font-weight:700;font-variant-numeric:tabular-nums;min-width:54px;text-align:right;}
  .stat{font-size:11px;border:1px solid #cbd5e1;border-radius:5px;padding:3px;background:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <h2>New Launch <span>Picker</span></h2>
  <div class="sub">All 159 ERA projects with live availability. <b>Tick the SG residential condos</b> to include. Non-residential / overseas are pre-unticked — scan and fix. Flip In-market ⇄ Upcoming if my call is wrong. Then <b>Export launches.json</b>.</div>
  <div class="bar">
    <input type="text" id="q" placeholder="Filter by name…" oninput="render()">
    <button class="ghost" onclick="bulk(true)">Tick all shown</button>
    <button class="ghost" onclick="bulk(false)">Untick all shown</button>
    <button onclick="exportJSON()">⤓ Export launches.json</button>
    <span class="tally" id="tally"></span>
  </div>
  <div id="list"></div>
</div>
<script>
var RAW=[], state={};  // slug -> {checked, status}
function titlecase(s){var f={gls:"GLS",ec:"EC",bt:"BT",pb:"PB",pa:"PA",w:"W",at:"at",by:"by",the:"The",on:"on",of:"of"};
  return s.split("-").map(function(w){return f[w]||w.charAt(0).toUpperCase()+w.slice(1);}).join(" ");}
function regionOf(d){var m=(d||"").match(/D0?(\d+)/);var n=m?+m[1]:0;
  if([1,2,6,9,10,11].indexOf(n)>=0)return"CCR";if([3,4,5,7,8,12,13,14,15,20].indexOf(n)>=0)return"RCR";return n?"OCR":"";}
function autoExclude(r){var s=r.slug,t=String(r.type_hint||"");
  if(/gls$|gls-/.test(s))return"GLS land";
  if(/cambodia|johor|forest-city|malaysia|thailand|bkk|princess-cove|aston/.test(s))return"overseas?";
  if(t.indexOf("exclude")>=0||t.indexOf("landed")>=0)return"landed?";
  if(t.indexOf("EC")>=0)return"EC?";
  if((t.indexOf("commercial")>=0||t.indexOf("industrial")>=0)&&t.indexOf("condo")<0)return"comm/ind?";
  return null;}

fetch("era_scrape_raw.json").then(function(r){return r.json();}).then(function(d){
  RAW=d.sort(function(a,b){return (b.avail||0)-(a.avail||0);});
  RAW.forEach(function(r){state[r.slug]={checked:!autoExclude(r), status:r.status};});
  render();
});

function render(){
  var q=(document.getElementById("q").value||"").toLowerCase();
  var L=document.getElementById("list");L.innerHTML="";
  var groups={in_market:[],pre_launch:[]};
  RAW.forEach(function(r){ if(q && titlecase(r.slug).toLowerCase().indexOf(q)<0)return; groups[state[r.slug].status].push(r);});
  [["in_market","Currently in Market"],["pre_launch","Launching / Upcoming"]].forEach(function(g){
    var h=document.createElement("div");h.className="grp";h.textContent=g[1]+" ("+groups[g[0]].length+")";L.appendChild(h);
    groups[g[0]].forEach(function(r){
      var st=state[r.slug], ex=autoExclude(r);
      var row=document.createElement("div");row.className="row"+(st.checked?"":" off");
      row.innerHTML='<input type="checkbox" '+(st.checked?"checked":"")+' onchange="tog(\''+r.slug+'\',this.checked)">'
        +'<span class="chip '+(st.status==="in_market"?"IM":"PL")+'">'+(st.status==="in_market"?"IN-MKT":"UPCOMING")+'</span>'
        +'<span class="nm">'+titlecase(r.slug)+' <small>'+(r.district||"")+'</small></span>'
        +(ex?'<span class="hint warn">'+ex+'</span>':'<span class="hint">'+(r.type_hint||"?")+'</span>')
        +'<span class="av">'+(r.avail!=null?r.avail:"—")+'</span>'
        +'<select class="stat" onchange="setStatus(\''+r.slug+'\',this.value)">'
          +'<option value="in_market"'+(st.status==="in_market"?" selected":"")+'>In-market</option>'
          +'<option value="pre_launch"'+(st.status==="pre_launch"?" selected":"")+'>Upcoming</option></select>';
      L.appendChild(row);
    });
  });
  var sel=RAW.filter(function(r){return state[r.slug].checked;});
  var im=sel.filter(function(r){return state[r.slug].status==="in_market";});
  var pl=sel.filter(function(r){return state[r.slug].status==="pre_launch";});
  document.getElementById("tally").textContent="Selected: "+sel.length+"  ·  in-market "+im.length+" ("+im.reduce(function(a,r){return a+(r.avail||0);},0)+" units)  ·  upcoming "+pl.length+" ("+pl.reduce(function(a,r){return a+(r.avail||0);},0)+" units)";
}
function tog(slug,v){state[slug].checked=v;render();}
function setStatus(slug,v){state[slug].status=v;render();}
function bulk(v){var q=(document.getElementById("q").value||"").toLowerCase();
  RAW.forEach(function(r){if(!q||titlecase(r.slug).toLowerCase().indexOf(q)>=0)state[r.slug].checked=v;});render();}
function exportJSON(){
  var im=[],pl=[];
  RAW.forEach(function(r){ if(!state[r.slug].checked)return;
    var o={name:titlecase(r.slug),district:r.district||"",region:regionOf(r.district),avail:r.avail,developer:""};
    if(state[r.slug].status==="in_market"){o.launched="selling";im.push(o);}else{o.launch="upcoming";pl.push(o);}});
  var out={_meta:{metric:"avail = units available",scope:"SG residential condos (Justin-picked)",as_of:new Date().toISOString().slice(0,10),avail_source:"ERA /units"},in_market:im,rest_of_2026:pl};
  var b=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="launches.json";a.click();
}
</script>
</body>
</html>
