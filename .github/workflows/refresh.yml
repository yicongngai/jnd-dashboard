name: Refresh & Deploy JND Dashboard

# Runs weekly (Mon 07:00 SGT / Sun 23:00 UTC) and on-demand. Re-fetches every baked
# data source, re-bakes them into index-live-auto.html, and deploys to GitHub Pages
# (free — no bandwidth credits). Live sources (HDB resale comps, price indices) fetch
# fresh in the browser regardless. Requires: repo is public (or GitHub Pro), and
# Settings -> Pages -> Source = "GitHub Actions".
on:
  schedule:
    - cron: '0 23 * * 0'      # 07:00 Singapore time every Monday (weekly)
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Refresh baked data (keep last-good on any failure)
        env:
          URA_ACCESS_KEY: ${{ secrets.URA_ACCESS_KEY }}
        run: |
          set -u
          ( cd market-tab && python3 sora_verify.py )  || echo "SORA failed — keeping last-good rates.json"
          ( cd market-tab && python3 era_scrape.py )   || echo "ERA failed — keeping last-good launches.json"
          python3 ura_build_comps.py                   || echo "URA build failed — keeping last-good ura-comps.json"
          python3 build_hdb_blocks.py                  || echo "HDB block build failed — keeping last-good hdb-blocks.json"
          python3 inject_data_all.py
          mkdir -p publish
          cp index-live-auto.html publish/index.html
          cp playbook.pdf publish/playbook.pdf
          echo "Built: $(du -h publish/index.html | cut -f1) + playbook $(du -h playbook.pdf | cut -f1)"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish
      - id: deploy
        uses: actions/deploy-pages@v4
